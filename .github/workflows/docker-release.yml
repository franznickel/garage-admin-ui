name: Deploy to Server

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read
  packages: write

# ------------------------------------------------------------
# 1) Hash & Tag-Validierung
# ------------------------------------------------------------
jobs:
  commit-hash:
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.get_commit.outputs.commit_hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get commit hash
        id: get_commit
        run: echo "commit_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Validate tag (SemVer)
        run: |
          if [[ ! ${GITHUB_REF#refs/tags/} =~ ^[0-9]+\.[0-9]+\.[0-9]+(-SNAPSHOT)?$ ]]; then
            echo "Version-Tag verletzt SemVer-Schema"
            exit 1
          fi

  # ------------------------------------------------------------
  # 2) Angular bauen
  # ------------------------------------------------------------
  build-fe:
    needs:
      - commit-hash
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular Application
        run: npm run build

      - name: Upload Angular dist
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dist/
          retention-days: 1

  # ------------------------------------------------------------
  # 3) Container bauen & veröffentlichen
  # ------------------------------------------------------------
  release:
    needs:
      - build-fe
      - commit-hash
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Angular dist
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: dist/

      - name: Lowercase repo owner
        id: repo_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build & Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/garageadminui:${{ needs.commit-hash.outputs.commit_hash }}
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/garageadminui:${{ github.ref_name }}
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/garageadminui:latest
          secrets: |
            npm_token=${{ secrets.GITHUB_TOKEN }}
