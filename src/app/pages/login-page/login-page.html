<div class="min-h-screen flex items-center justify-center p-4" style="background-color: #f0ede8; font-family: 'DM Sans', sans-serif;">
  <div class="w-full max-w-sm">
    <app-logo-component class="flex items-center gap-2.5 justify-center mb-8"></app-logo-component>

    <div class="bg-white rounded-2xl border border-gray-200 p-8" style="box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.05);">
      <div class="mb-6 p-4 rounded-xl border border-orange-200 bg-orange-50 flex gap-3">
        <i class="ph ph-warning-circle text-orange-500 text-xl mt-0.5"></i>
        <div>
          <p class="text-sm font-semibold text-orange-800">Release v{{version}}</p>
          <p class="text-xs text-orange-700 mt-1 leading-relaxed">
            This is an early release. Please use the editing functions with caution.
          </p>
        </div>
      </div>

      <h1 class="text-xl font-semibold text-gray-900 mb-1">Connect</h1>
      <p class="text-sm text-gray-400 mb-6">Insert Garage URL and Admin Token.</p>
      @if (errorMessage) {
        <div class="bg-red-50 text-red-600 text-xs rounded-lg px-3.5 py-2.5 mb-5 border border-red-100">
          {{ errorMessage }}
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label for="url" class="block text-xs font-semibold text-gray-500 mb-1.5 tracking-wide uppercase">Garage URL</label>
          <input
            id="url"
            type="url"
            formControlName="url"
            placeholder="http://localhost:3900"
            class="w-full px-3.5 py-2.5 text-sm border border-gray-200 rounded-xl outline-none bg-gray-50 focus:bg-white transition placeholder-gray-300"
          />
        </div>
        <div class="mb-6">
          <label for="token" class="block text-xs font-semibold text-gray-500 mb-1.5 tracking-wide uppercase">Admin-Token</label>
          <div class="relative">
            <input
              id="token"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="token"
              placeholder="••••••••••••••••"
              class="w-full px-3.5 py-2.5 text-sm border border-gray-200 rounded-xl outline-none bg-gray-50 focus:bg-white transition placeholder-gray-300 pr-10"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition cursor-pointer"
            >
              <i class="ph" [class.ph-eye]="!showPassword" [class.ph-eye-slash]="showPassword"></i>
            </button>
          </div>
        </div>
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full py-2.5 text-sm bg-[#e8832a] font-semibold text-white rounded-xl transition disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
        >
          {{ isLoading ? 'Connecting…' : 'Connect' }}
        </button>
      </form>
    </div>
  </div>
</div>
