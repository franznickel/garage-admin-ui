<div>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-2xl font-bold">Nodes</h1>
    <app-refresh-button-component (buttonClicked)="refresh()" [isLoading]="isLoading"></app-refresh-button-component>
  </div>
  @if (status$ | async; as status) {
    <div class="flex flex-col gap-3">
      @for (node of status.nodes; track node.id) {
        <app-node-card-component [node]="node"></app-node-card-component>
      }
    </div>
  }
</div>
