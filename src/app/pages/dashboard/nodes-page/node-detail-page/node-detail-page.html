<div>
  <div class="flex justify-between items-center mb-8">
    @if (node$ | async; as node) {
      <h1 class="text-2xl font-bold">{{ node.hostname }}</h1>
    } @else {
      <h1 class="text-2xl font-bold">...</h1>
    }
    <app-refresh-button-component (buttonClicked)="refresh()" [isLoading]="isLoading"></app-refresh-button-component>
  </div>
  @if (node$ | async; as node) {
    <div class="flex flex-col gap-6">
      <div class="flex items-center justify-between">
        <h2 class="text-sm text-gray-500">Garage Version: {{ node.garageVersion }}</h2>
      </div>
      <div class="grid grid-cols-3 gap-4">
        <app-info-card-component [key]="'Address'" [value]="node.addr"></app-info-card-component>
      </div>
    </div>
  }
</div>
